<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfwork Variabili</title>
</head>
<body>

    <h1>Esercizio Variabili in JavaScript</h1>
    <p>Apri la console del browser per vedere i risultati.</p>

    <script>
        // 1. Dichiara num1 e assegna un numero qualsiasi
        let num1 = 15;

        // 2. Dichiara num2 e assegna un numero qualsiasi
        let num2 = 42;

        // 3. Visualizza a schermo il valore di num1 e num2
        console.log("Valore di num1: " + num1);
        console.log("Valore di num2: " + num2);

        // 4. Dichiara una variabile chiamata stringa con un testo qualsiasi
        let stringa = "Benvenuti nel corso di JavaScript!";

        // 5. Stampa a schermo il valore della variabile stringa
        console.log("Stringa iniziale: " + stringa);

        // 6. Sostituisci il valore della variabile stringa e stampalo di nuovo
        stringa = "Questo testo è stato modificato correttamente.";
        console.log("Stringa modificata: " + stringa);

        // 7. Dichiara una costante chiamata PIGRECO
        const PIGRECO = 3.14159265359;

        // 8. Visualizza a schermo il valore di PIGRECO
        console.log("Valore di PIGRECO: " + PIGRECO);

        // 9. Prova a cambiare il valore della costante per vedere cosa succede
        // PIGRECO = 3.14; 
    </script>
</body>
</html>
